aid: sonantic
name: Sonantic
description: >-
  Sonantic was a London-based AI voice company that built hyper-realistic,
  emotionally expressive text-to-speech models for entertainment, gaming, and
  film. The company is best known for recreating Val Kilmer's voice for Top
  Gun: Maverick after he lost his speaking voice to throat cancer. Spotify
  acquired Sonantic in June 2022 for a reported 93 million euros, and the
  underlying TTS technology has since been folded into Spotify products,
  most visibly the Spotify AI DJ feature launched in 2023. As of 2026,
  Sonantic no longer operates as a standalone product or public API. This
  apis.yml entry exists as a historical and archival record of the company,
  its technology, and its acquisition.
